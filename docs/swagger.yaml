  /api/proposal/{proposalId}/reject:
    post:
      description: |-
        管理员操作：将状态为 pending（待审核）的提案变更为 rejected（已拒绝）
        使用场景：课程提案审核流程中，管理员认为提案不符合要求，驳回该提案
        注意事项：
        - 仅管理员可操作（需先调用 /api/auth/is_admin 确认权限）
        - 仅状态为 pending 的提案可以拒绝，已 approved/rejected 的提案无法再次操作
        - 拒绝后不会创建课程记录，仅更新提案状态
      parameters:
      - description: 提案ID
        in: path
        name: proposalId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
